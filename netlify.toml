[build]
  command = "npm run build"
  publish = "dist" # This is where Vite puts your compiled React code

[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"

# This redirects frontend /api calls to your hidden serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# This ensures React Router works if you ever add multiple pages
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200